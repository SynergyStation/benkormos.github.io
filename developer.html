<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergyStation - Developers</title>
    <link rel="icon" type="image/jpeg" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- MANIFEST / CARBON COPY (DARK) SYSTEM --- */
        :root {
            --bg-main: #15130d;
            --bg-surface: #1d1a12;
            --bg-surface-elevated: #232016;

            --border-main: rgba(245, 239, 224, 0.08);
            --border-active: rgba(245, 239, 224, 0.24);

            --accent-stamp: #6fa8ff;
            --accent-hazard: #ffa24f;
            --accent-ok: #4fdb96;
            --accent-alert: #ff7a6c;

            --text-pure: #f5efdf;
            --text-main: #cdc4ac;
            --text-muted: #746c56;
            --text-dark: #15130d;

            --font-display: 'Archivo Black', sans-serif;
            --font-sans: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;

            --radius-lg: 2px;
            --radius-md: 2px;
            --radius-sm: 1px;
            --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            background-color: var(--bg-main);
            background-image:
                repeating-linear-gradient(rgba(245, 239, 224, 0.035) 0px, rgba(245, 239, 224, 0.035) 1px, transparent 1px, transparent 32px),
                radial-gradient(rgba(245, 239, 224, 0.05) 0.6px, transparent 0.6px);
            background-size: auto, 6px 6px;
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 24px 60px 24px;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Perforated tear-strip along the very top of the page */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 9px;
            background-color: var(--text-pure);
            background-image: radial-gradient(circle, var(--bg-main) 3px, transparent 3.2px);
            background-size: 18px 9px;
            background-position: 9px center;
            z-index: 1001;
        }

        .container { 
            width: 100%; 
            max-width: 780px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            opacity: 0;
            animation: manifest-stamp-in 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes manifest-stamp-in {
            from { opacity: 0; transform: scale(1.015); }
            to { opacity: 1; transform: scale(1); }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 600;
            transition: var(--transition-fast);
            width: fit-content;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .back-link:hover { color: var(--text-pure); }

        /* --- FORM PANEL SYSTEM --- */
        .panel {
            position: relative;
            background: var(--bg-surface-elevated);
            border: 1px solid var(--border-main);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.3);
            transition: var(--transition-fast);
        }

        .panel:hover {
            border-color: var(--border-active);
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            transform: translate(-1px, -1px);
        }

        /* Registration corner marks, like a technical drawing */
        .panel::before,
        .panel::after {
            content: '';
            position: absolute;
            width: 9px;
            height: 9px;
            pointer-events: none;
        }

        .panel::before {
            top: -1px;
            left: -1px;
            border-top: 2px solid var(--accent-stamp);
            border-left: 2px solid var(--accent-stamp);
        }

        .panel::after {
            bottom: -1px;
            right: -1px;
            border-bottom: 2px solid var(--accent-hazard);
            border-right: 2px solid var(--accent-hazard);
        }

        .panel-title {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-pure);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .panel-title i { 
            color: var(--text-muted); 
        }

        .live-tag {
            color: var(--accent-ok);
            background: transparent;
            border: 1px solid var(--accent-ok);
            padding: 1px 5px;
            border-radius: var(--radius-sm);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- CORE DEV GRID (roster cards) --- */
        .dev-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
        }

        /* Card Link Wrapper */
        .dev-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .dev-card {
            background: var(--bg-surface);
            border: 1px dashed var(--border-main);
            border-radius: var(--radius-md);
            padding: 28px 12px 24px 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition: var(--transition-fast);
            height: 100%;
        }
        
        .dev-link:hover .dev-card {
            background: var(--bg-surface-elevated);
            border-style: solid;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.35);
        }

        /* Profile-specific ink stamps, mapped from the homepage accents */
        .dev-link:hover .dev-card.ben { border-color: var(--accent-stamp); }
        .dev-link:hover .dev-card.julian { border-color: var(--accent-alert); }
        .dev-link:hover .dev-card.mexo { border-color: var(--accent-ok); }

        .avatar-mainframe {
            width: 72px;
            height: 72px;
            position: relative;
        }

        .dev-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-lg);
            border: 2px solid var(--border-active);
            filter: grayscale(0.35) contrast(1.05) brightness(0.95);
            transition: var(--transition-fast);
            background: var(--bg-main);
        }

        .dev-link:hover .dev-avatar {
            filter: grayscale(0);
        }
        
        .dev-link:hover .dev-card.ben .dev-avatar { border-color: var(--accent-stamp); }
        .dev-link:hover .dev-card.julian .dev-avatar { border-color: var(--accent-alert); }
        .dev-link:hover .dev-card.mexo .dev-avatar { border-color: var(--accent-ok); }

        .dev-info h4 { 
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 0.9rem; 
            color: var(--text-pure);
            margin-bottom: 2px;
        }
        
        .dev-info p { 
            font-family: var(--font-mono);
            color: var(--text-muted); 
            font-size: 0.6rem; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- RESPONSIVENESS MATRIX --- */
        @media (max-width: 768px) {
            .dev-grid { grid-template-columns: 1fr; gap: 10px; }
            body { padding-top: 80px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Mainframe</a>
        
        <section class="panel">
            <div class="panel-title">
                <span><i class="fas fa-code"></i> CORE // DEVELOPMENT_TEAM</span>
                <span class="live-tag">VERIFIED_UNITS</span>
            </div>
            
            <div class="dev-grid">
                
                <!-- BenKormos Link -->
                <a href="benkormos.html" class="dev-link">
                    <div class="dev-card ben">
                        <div class="avatar-mainframe">
                            <img src="pictures/benkormos.profilbild.jpg" alt="BenKormos" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=BenKormos&background=0a0a12&color=00f0ff&bold=true'">
                        </div>
                        <div class="dev-info">
                            <h4>BenKormos</h4>
                            <p>Founder & Lead Dev</p>
                        </div>
                    </div>
                </a>
                
                <!-- Julian442 Link -->
                <a href="julian442.html" class="dev-link">
                    <div class="dev-card julian">
                        <div class="avatar-mainframe">
                            <img src="pictures/julian.profilbild.png" alt="Julian442" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Julian442&background=0a0a12&color=ff2a6d&bold=true'">
                        </div>
                        <div class="dev-info">
                            <h4>Julian442</h4>
                            <p>Core Developer</p>
                        </div>
                    </div>
                </a>

                <!-- Mexo Link -->
                <a href="mexo.html" class="dev-link">
                    <div class="dev-card mexo">
                        <div class="avatar-mainframe">
                            <img src="pictures/mexo.profilbild.png" alt="Mexo" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Mexo&background=0a0a12&color=00ffaa&bold=true'">
                        </div>
                        <div class="dev-info">
                            <h4>Mexo</h4>
                            <p>Core Developer</p>
                        </div>
                    </div>
                </a>
                
            </div>
        </section>
    </div>

</body>
</html>

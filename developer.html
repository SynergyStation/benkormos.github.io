<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynergyStation - Developers</title>
    <link rel="icon" type="image/jpeg" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 26, 44, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary-gradient: linear-gradient(135deg, #00ff88 0%, #00bcff 100%);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 188, 255, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 255, 136, 0.08) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container { 
            width: 100%; 
            max-width: 800px; /* Erhöht, damit das Grid Platz zum Entfalten hat */
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            width: fit-content;
        }
        .back-link:hover { color: #00ff88; }

        .section-box {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- NEUES RESPONSIVES GRID SYSTEM --- */
        .dev-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            width: 100%;
        }

        .dev-card {
            display: flex;
            flex-direction: column; /* Zentrierter Card-Stil für besseren Grid-Look */
            align-items: center;
            text-align: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            padding: 24px 16px;
            border-radius: 16px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .dev-card:hover {
            border-color: rgba(0, 188, 255, 0.3);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.05);
        }

        .avatar-container {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .dev-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00ff88;
            background: #141a2c;
        }

        .dev-info h4 { 
            font-size: 1.1rem; 
            font-weight: 600;
            margin-bottom: 4px; 
            color: var(--text-main);
        }
        
        .dev-info p { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Zurück zum Hub</a>
        
        <section class="section-box">
            <h2><i class="fas fa-code"></i> Team & Developers</h2>
            
            <!-- Grid Container umschließt alle Karten -->
            <div class="dev-grid">
                
                <!-- BenKormos -->
                <div class="dev-card">
                    <div class="avatar-container">
                        <img src="pictures/benkormos.profilbild.jpg" alt="BenKormos" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=BenKormos&background=141a2c&color=00ff88&bold=true'">
                    </div>
                    <div class="dev-info">
                        <h4>BenKormos</h4>
                        <p>Founder & Lead Developer</p>
                    </div>
                </div>
                
                <div class="dev-card">
                    <div class="avatar-container">
                        <img src="pictures/julian.profilbild.png" alt="Julian442" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Julian442&background=141a2c&color=00ff88&bold=true'">
                    </div>
                    <div class="dev-info">
                        <h4>Julian442</h4>
                        <p>Developer</p>
                    </div>
                </div>

                <!-- Mexo -->
                <div class="dev-card">
                    <div class="avatar-container">
                        <img src="pictures/mexo.profilbild.png" alt="Mexo" class="dev-avatar" onerror="this.src='https://ui-avatars.com/api/?name=Mexo&background=141a2c&color=00ff88&bold=true'">
                    </div>
                    <div class="dev-info">
                        <h4>Mexo</h4>
                        <p>Developer</p>
                    </div>
                </div>
                

            </div>
        </section>
    </div>

</body>
</html>

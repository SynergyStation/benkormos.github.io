<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian - Links & Projects</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Hintergrundbild: Trage hier den Namen deines Bildes ein */
            background-image: url('image_2b8588.jpg'), linear-gradient(135deg, #ff8a9c, #6c88b5, #192b4d);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Schwebende Musik-Steuerung (Oben Links) */
        .music-controls {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #162a45;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(1.05);
        }

        /* Hauptkarte (Glassmorphism) */
        .card {
            background: rgba(240, 245, 250, 0.75); /* Helles Glas */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 600px;
            position: relative;
            text-align: center;
            overflow: hidden; /* Wichtig für den Footer-Bereich */
            display: flex;
            flex-direction: column;
        }

        /* Der obere, innere Bereich der Karte */
        .card-content {
            padding: 40px 30px;
            position: relative;
        }

        /* Profilbild Oben Links */
        .avatar {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 1px solid #162a45; /* Dunkler Rand wie im Bild */
            object-fit: cover;
            background-color: #fff;
        }

        /* Name */
        h1 {
            font-size: 2.2rem;
            color: #162a45;
            font-weight: 400;
            margin-top: 15px; /* Platz für das Icon links */
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Tagline (CONTENT CREATOR...) */
        .tagline {
            font-size: 0.75rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 35px;
            font-weight: 500;
        }

        /* Social Icons Container */
        .socials {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        .emoji {
            font-size: 1.5rem;
        }

        /* Runde Social Buttons */
        .social-btn {
            background-color: #162a45; /* Dunkelblau aus dem Bild */
            color: #ffffff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            background-color: #ff8a9c; /* Sakura-Akzent beim Hover */
            box-shadow: 0 5px 15px rgba(255, 138, 156, 0.4);
        }

        /* Statistiken (Views & Links) */
        .stats p {
            font-size: 0.8rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0;
            font-weight: 500;
        }

        .stats a {
            color: #162a45;
            text-decoration: none;
            font-weight: 700;
        }

        .stats a:hover {
            text-decoration: underline;
        }

        /* Footer Button (SynergyStation) */
        .card-footer {
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding: 16px;
            text-decoration: none;
            color: #333;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: background 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        .card-footer:hover {
            background: rgba(255, 255, 255, 0.4);
            color: #162a45;
        }

    </style>
</head>
<body>

    <!-- Verstecktes Audio-Element (Trage hier deine Musikdatei ein!) -->
    <audio id="bg-audio" src="music.mp3" loop></audio>

    <!-- Musik Steuerung (Oben Links) -->
    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn" title="Play/Pause">
            <i class="fas fa-play"></i>
        </button>
        <button class="control-btn" id="volume-btn" title="Mute/Unmute">
            <i class="fas fa-volume-up"></i>
        </button>
    </div>

    <!-- Hauptkarte -->
    <div class="card">
        
        <div class="card-content">
            <!-- Profilbild oben links -->
            <img src="pictures/julian.profilbild.png" alt="Julian" class="avatar">
            
            <h1>🌸 Julian 🌸</h1>
            <p class="tagline">Content Creator • Sharing Vibes! ✨</p>
            
            <!-- Social Icons -->
            <div class="socials">
                <span class="emoji">🌊</span>
                <a href="#" class="social-btn"><i class="fab fa-spotify"></i></a>
                <a href="https://twitch.tv/julian442_" class="social-btn"><i class="fab fa-twitch"></i></a>
                <a href="https://youtube.com/@Julian_2044" class="social-btn"><i class="fab fa-youtube"></i></a>
                <a href="https://dc.gg/ben" class="social-btn"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>
                <span class="emoji">🎋</span>
            </div>
            
            <!-- Infos -->
            <div class="stats">
                <p>Profile Views: 15 👀</p>
                <p>Partner: <a href="https://synergystation.github.io/" target="_blank">SynergyStation</a> 🔗</p>
            </div>
        </div>

        <!-- Footer / SynergyStation Link -->
        <a href="https://synergystation.github.io/" class="card-footer" target="_blank">
            SynergyStation Besuchen
        </a>
    </div>

    <!-- JavaScript für die Musik -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const audio = document.getElementById('bg-audio');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = playPauseBtn.querySelector('i');
            
            const volumeBtn = document.getElementById('volume-btn');
            const volumeIcon = volumeBtn.querySelector('i');

            // Play / Pause
            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    playIcon.classList.replace('fa-play', 'fa-pause');
                } else {
                    audio.pause();
                    playIcon.classList.replace('fa-pause', 'fa-play');
                }
            });

            // Mute / Unmute
            volumeBtn.addEventListener('click', () => {
                audio.muted = !audio.muted;
                if (audio.muted) {
                    volumeIcon.classList.replace('fa-volume-up', 'fa-volume-mute');
                } else {
                    volumeIcon.classList.replace('fa-volume-mute', 'fa-volume-up');
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian - リンク</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Neue, cleane und japanisch angehauchte Schriftarten -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Zen Kaku Gothic für den Text (sehr clean und modern) */
            font-family: 'Zen Kaku Gothic New', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('image_2b8588.jpg'), linear-gradient(135deg, #111520, #2a1c24);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #2c3e50;
        }

        /* Schwebende Musik-Steuerung (Oben Links) */
        .music-controls {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.1);
        }

        /* Hauptkarte (Ultra-Clean Glassmorphism) */
        .card {
            background: rgba(250, 250, 252, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-content {
            padding: 50px 40px 40px 40px;
            position: relative;
        }

        /* Das Profilbild dezent oben links in der Karte */
        .avatar {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Der leuchtende Kirschblüten-Ball (Sakura Ball) */
        .sakura-ball {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff0f3, #ffb7c5);
            box-shadow: 
                0 0 25px rgba(255, 183, 197, 0.8),
                inset 0 0 15px rgba(255, 255, 255, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* Name im traditionell eleganten Stil */
        h1 {
            font-family: 'Shippori Mincho', serif;
            font-size: 2.2rem;
            color: #1a1e24;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 5px;
        }

        /* Japanischer Name (Subtiler Akzent) */
        h1 .kanji {
            font-size: 0.9rem;
            color: #ff6b81;
            letter-spacing: 4px;
            font-family: 'Zen Kaku Gothic New', sans-serif;
            font-weight: 400;
        }

        /* Tagline */
        .tagline {
            font-size: 0.75rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Social Icons (Sehr minimal und clean) */
        .socials {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-btn {
            color: #2f3640;
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        .social-btn::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #ff6b81;
            border-radius: 50%;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            transition: transform 0.3s ease;
        }

        .social-btn:hover {
            color: #ff6b81;
            transform: translateY(-4px);
        }

        .social-btn:hover::after {
            transform: translateX(-50%) scale(1);
        }

        /* SynergyStation Button (Clean) */
        .card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            text-decoration: none;
            color: #2f3640;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .card-footer:hover {
            background: rgba(255, 255, 255, 0.4);
            color: #ff6b81;
        }

        .card-footer i {
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <!-- Verstecktes Audio-Element -->
    <audio id="bg-audio" src="music.mp3" loop></audio>

    <!-- Musik Steuerung -->
    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn" title="Play/Pause">
            <i class="fas fa-play"></i>
        </button>
        <button class="control-btn" id="volume-btn" title="Mute/Unmute">
            <i class="fas fa-volume-up"></i>
        </button>
    </div>

    <!-- Hauptkarte -->
    <div class="card">
        
        <div class="card-content">
            <!-- Profilbild (klein & dezent in der Ecke) -->
            <img src="pictures/julian.profilbild.png" alt="Julian" class="avatar">
            
            <!-- Der neue Kirschblüten-Ball -->
            <div class="sakura-ball">🌸</div>
            
            <!-- Titel mit japanischer Übersetzung -->
            <h1>
                Julian
                <span class="kanji">ジュリアン</span>
            </h1>
            
            <p class="tagline">Content Creator • Sharing Vibes</p>
            
            <!-- Cleane Social Icons -->
            <div class="socials">
                <a href="#" class="social-btn"><i class="fab fa-spotify"></i></a>
                <a href="https://twitch.tv/julian442_" class="social-btn"><i class="fab fa-twitch"></i></a>
                <a href="https://youtube.com/@Julian_2044" class="social-btn"><i class="fab fa-youtube"></i></a>
                <a href="https://dc.gg/ben" class="social-btn"><i class="fab fa-discord"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-btn"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>

        <!-- SynergyStation Partner Link im Footer -->
        <a href="https://synergystation.github.io/" class="card-footer" target="_blank">
            <i class="fas fa-link"></i>
            <span>Partner von SynergyStation</span>
        </a>
    </div>

    <!-- JavaScript für die Musik -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const audio = document.getElementById('bg-audio');
            const playPauseBtn = document.getElementById('play-pause-btn');
            const playIcon = playPauseBtn.querySelector('i');
            
            const volumeBtn = document.getElementById('volume-btn');
            const volumeIcon = volumeBtn.querySelector('i');

            // Play / Pause
            playPauseBtn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    playIcon.classList.replace('fa-play', 'fa-pause');
                } else {
                    audio.pause();
                    playIcon.classList.replace('fa-pause', 'fa-play');
                }
            });

            // Mute / Unmute
            volumeBtn.addEventListener('click', () => {
                audio.muted = !audio.muted;
                if (audio.muted) {
                    volumeIcon.classList.replace('fa-volume-up', 'fa-volume-mute');
                } else {
                    volumeIcon.classList.replace('fa-volume-mute', 'fa-volume-up');
                }
            });
        });
    </script>
</body>
</html>

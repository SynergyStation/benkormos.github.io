<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian - Links</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Zen Kaku Gothic New', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d0c10;
            color: #ffffff;
        }

        /* Musik-Controls */
        .music-controls { position: absolute; top: 30px; left: 30px; display: flex; gap: 15px; }
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 45px; height: 45px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Die Glas-Karte mit Pink-Animation */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            /* Animierter Pink-Verlauf als Hintergrund-Overlay */
            position: relative;
            background-image: linear-gradient(135deg, rgba(255, 107, 129, 0.2), rgba(64, 43, 67, 0.2));
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card-content { padding: 40px; }

        .avatar {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        .sakura-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px rgba(255, 107, 129, 0.8));
        }

        h1 { font-family: 'Shippori Mincho', serif; font-size: 2rem; margin-bottom: 5px; }
        .kanji { color: #ff8ca3; font-size: 0.9rem; letter-spacing: 3px; display: block; margin-bottom: 20px; }

        .socials { display: flex; justify-content: center; gap: 20px; font-size: 1.4rem; margin-top: 30px; }
        .socials a { color: #ffffff; opacity: 0.7; transition: 0.3s; }
        .socials a:hover { opacity: 1; color: #ff8ca3; transform: translateY(-3px); }

        /* Footer Link */
        .card-footer {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            display: block;
            text-decoration: none;
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <audio id="bg-audio" src="music.mp3" loop></audio>

    <div class="music-controls">
        <button class="control-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
        <button class="control-btn" id="volume-btn"><i class="fas fa-volume-up"></i></button>
    </div>

    <div class="card">
        <div class="card-content">
            <img src="pictures/julian.profilbild.png" class="avatar" alt="Avatar">
            <div class="sakura-icon">🌸</div>
            <h1>Julian</h1>
            <span class="kanji">ジュリアン</span>
            <p>CONTENT CREATOR • SHARING VIBES</p>
            
            <div class="socials">
                <a href="#"><i class="fab fa-spotify"></i></a>
                <a href="https://twitch.tv/julian442_"><i class="fab fa-twitch"></i></a>
                <a href="https://youtube.com/@Julian_2044"><i class="fab fa-youtube"></i></a>
                <a href="https://dc.gg/ben"><i class="fab fa-discord"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
        <a href="https://synergystation.github.io/" class="card-footer" target="_blank">
            <i class="fas fa-link"></i> PARTNER VON SYNERGYSTATION
        </a>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        document.getElementById('play-pause-btn').onclick = () => {
            audio.paused ? audio.play() : audio.pause();
        };
        document.getElementById('volume-btn').onclick = () => {
            audio.muted = !audio.muted;
        };
    </script>
</body>
</html>

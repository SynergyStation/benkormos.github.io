<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian442 - Links & Projects</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Japan Modern Dark Style */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0c10; 
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Traditionelles Seigaiha (Wellen) Muster als dezenter CSS-Hintergrund */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0c10;
            background-image: 
                radial-gradient(circle at 100% 150%, #0d0c10 24%, #16141a 24%, #16141a 28%, #0d0c10 28%, #0d0c10 36%, #16141a 36%, #16141a 40%, #0d0c10 40%, #0d0c10 48%, #16141a 48%, #16141a 52%, #0d0c10 52%),
                radial-gradient(circle at 0% 150%, #0d0c10 24%, #16141a 24%, #16141a 28%, #0d0c10 28%, #0d0c10 36%, #16141a 36%, #16141a 40%, #0d0c10 40%, #0d0c10 48%, #16141a 48%, #16141a 52%, #0d0c10 52%);
            background-size: 60px 30px;
            opacity: 0.4;
            z-index: -1;
            pointer-events: none;
        }

        /* Haupt-Container (Nebeneinander-Layout) */
        .container {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
            z-index: 1;
        }

        /* Zurück zum Hub Link */
        .back-link {
            color: #6d697f;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            align-self: flex-start;
            border-bottom: 1px dashed transparent;
        }
        
        .back-link:hover {
            color: #ff79c6;
            border-color: #ff79c6;
        }

        /* Profil-Bereich */
        .profile {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-container {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #ff79c6;
            box-shadow: 0 0 20px rgba(255, 121, 198, 0.2);
            background-color: #16141c;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease;
            margin-bottom: 15px;
            position: relative;
        }

        /* Kleiner roter Kreis (Sonne) hinter dem Avatar beim Hover */
        .avatar-container::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(255, 85, 85, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .avatar-container:hover {
            transform: scale(1.04);
        }
        .avatar-container:hover::after {
            opacity: 1;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }

        .avatar-fallback {
            font-size: 2.5rem;
            color: #4a465a;
            z-index: 2;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .tagline {
            font-size: 0.85rem;
            color: #ff79c6;
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* --- GRID FÜR NEBENIEINANDER-LAYOUT --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 Boxen nebeneinander */
            gap: 24px;
            width: 100%;
        }

        /* Japanische Minimalismus-Cards */
        .section-box {
            background: #14121a;
            border-left: 4px solid #ff5555; /* Roter Akzentbalken links */
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 4px 16px 16px 4px; /* Oben links eckig, Rest abgerundet */
            padding: 26px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .section-box:hover {
            border-left-color: #ff79c6; /* Wechselt zu Sakura-Rosa beim Hover */
            transform: translateY(-3px);
            background: #181620;
        }

        h3 {
            font-size: 1.15rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between; /* Platz für die Kanjis rechts */
        }

        /* Das japanische Schriftzeichen rechts im Titel */
        h3 .kanji {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 400;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.65;
            color: #b9b6cb;
            margin: 0 0 10px 0;
        }
        
        p:last-child {
            margin-bottom: 0;
        }

        /* Organisation / Project Styling */
        .project-card h4 {
            margin: 0 0 12px 0;
            font-size: 1.15rem;
            color: #ffffff;
        }

        .project-card a {
            color: #ff79c6;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }

        .project-card a:hover {
            color: #ff5555;
        }

        /* Link-Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.02);
            color: #e2e0ec;
            text-decoration: none;
            padding: 13px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .link-btn i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
            color: #ff5555;
            transition: transform 0.2s;
        }

        .link-btn:hover {
            background: #ffffff;
            color: #0d0c10;
            border-color: #ffffff;
        }

        .link-btn:hover i {
            color: #ff5555;
            transform: scale(1.1);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 10px;
        }

        .footer p {
            font-size: 0.85rem;
            color: #4a465a;
        }

        /* --- RESPONSIVE LAYOUT (Handys) --- */
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr; /* Untereinander auf Smartphones */
                gap: 20px;
            }
            .container {
                max-width: 500px;
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Zurück zum Hub
        </a>

        <header class="profile">
            <div class="avatar-container" id="avatar-box">
                <img src="pictures/julian.profilbild.png" id="profile-img" alt="Profile" style="display:none;">
                <i class="fas fa-user avatar-fallback" id="fallback-icon"></i>
            </div>
            <h1>Julian</h1>
            <p class="tagline">Developer • 開発者</p>
        </header>

        <!-- Start des Grid-Layouts (Nebeneinander) -->
        <main class="main-grid">

            <!-- Box 1: About Me -->
            <section class="section-box">
                <h3>
                    <span><i class="far fa-smile"></i> About Me</span>
                    <span class="kanji">私について</span>
                </h3>
                <p>Ich bin der Julian442.</p>
                <p>Ich bin sehr tuff.</p>
            </section>

            <!-- Box 2: Organisation -->
            <section class="section-box">
                <h3>
                    <span><i class="fas fa-sitemap"></i> Organisation</span>
                    <span class="kanji">組織</span>
                </h3>
                <div class="project-card">
                    <h4>SYNERGYstation</h4>
                    <a href="https://github.com/SynergyStation" target="_blank">
                        <i class="fab fa-github"></i> View Organisation
                    </a>
                </div>
            </section>

            <!-- Box 3: Links -->
            <section class="section-box">
                <h3>
                    <span><i class="fas fa-link"></i> Links</span>
                    <span class="kanji">リンク</span>
                </h3>
                <div class="links-container">
                    <a href="https://github.com/julixn442" target="_blank" class="link-btn">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                    <a href="https://youtube.com/@Julian_2044" target="_blank" class="link-btn">
                        <i class="fab fa-youtube"></i> YouTube
                    </a>
                    <a href="https://twitch.tv/julian442_" target="_blank" class="link-btn">
                        <i class="fab fa-twitch"></i> Twitch
                    </a>
                    <a href="https://dc.gg/ben" target="_blank" class="link-btn">
                        <i class="fab fa-discord"></i> Discord
                    </a>
                </div>
            </section>

        </main>
        <!-- Ende des Grid-Layouts -->

        <footer class="footer">
            <p>© 2026 @Julian442 • Powered by SynergyStation</p>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const profileImg = document.getElementById('profile-img');
            const fallbackIcon = document.getElementById('fallback-icon');

            profileImg.onload = function() {
                profileImg.style.display = 'block';
                fallbackIcon.style.display = 'none';
            };
            profileImg.onerror = function() {
                profileImg.style.display = 'none';
                fallbackIcon.style.display = 'block';
            };
            
            if (profileImg.complete) profileImg.onload();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julian442 - Links & Projects</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/julian.profilbild.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Basis-Layout */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #12111a; 
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Eigener Layer für das Hintergrundbild, damit NUR das Bild geblurt wird */
        body::before {
            content: "";
            position: fixed;
            top: -10px; /* Leicht vergrößert, damit an den Rändern durch den Blur kein weißer Rand entsteht */
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            
            /* Hier wird dein Bild geladen. Die Maske dunkelt es leicht ab, damit man Text besser liest */
            background: linear-gradient(rgba(18, 17, 26, 0.75), rgba(18, 17, 26, 0.75)), 
                        url('julian.hintergrund.png') no-repeat center center fixed;
            background-size: cover;
            
            /* Der gewünschte leichte Blur-Effekt für das Hintergrundbild */
            filter: blur(6px);
            -webkit-filter: blur(6px);
            
            z-index: -1; /* Schiebt das Bild hinter den Inhalt */
            pointer-events: none;
        }

        /* Haupt-Container */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Zurück zum Hub Link */
        .back-link {
            color: #60647c;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #00ff88;
        }

        /* Profil-Bereich */
        .profile {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Avatar-Wrapper für sauberes Fallback-Icon */
        .avatar-container {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            background-color: #2a2838;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.3s ease;
            margin-bottom: 15px;
        }

        .avatar-container:hover {
            transform: scale(1.05) rotate(3deg);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Standard-Icon Styling falls Bild fehlt */
        .avatar-fallback {
            font-size: 2.5rem;
            color: #60647c;
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .tagline {
            font-size: 0.95rem;
            color: #00ff88;
            margin: 0;
            font-weight: 500;
            text-align: center;
        }

        /* Boxen / Cards (Bleiben solide dunkelgrau) */
        .section-box {
            background: rgba(30, 28, 41, 0.85); /* Etwas deckender für perfekte Lesbarkeit über dem Hintergrund */
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            box-sizing: border-box;
        }

        h3 {
            font-size: 1.15rem;
            margin-top: 0;
            margin-bottom: 16px;
            color: #ffffff;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #cdd1e4;
            margin: 0 0 8px 0;
            text-align: left;
        }
        
        p:last-child {
            margin-bottom: 0;
        }

        /* Link-Buttons Container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s ease;
            box-sizing: border-box;
        }

        .link-btn i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .link-btn:hover {
            background: #00ff88;
            color: #12111a;
            border-color: #00ff88;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.25);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            width: 100%;
        }

        .footer p {
            font-size: 0.8rem;
            color: #60647c;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <a href="../index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Zurück zum Hub
        </a>

        <header class="profile">
            <div class="avatar-container" id="avatar-box">
                <img src="pictures/julian.profilbild.png" id="profile-img" alt="Profile" style="display:none;">
                <i class="fas fa-user avatar-fallback" id="fallback-icon"></i>
            </div>
            <h1>Julian</h1>
            <p class="tagline">Developer</p>
        </header>

        <section class="section-box">
            <h3>About Me 👋</h3>
            <p>Ich bin der Julian442.</p>
            <p>Ich bin sehr tuff.</p>
        </section>

        <section class="section-box">
            <h3>My Organisation</h3>
            <div class="project-grid">
                <div class="project-card">
                    <h4>SYNERGYstation</h4>
                    <a href="https://github.com/SynergyStation" target="_blank">
                        <i class="fab fa-github"></i> View Organisation
                    </a>
                </div>
        </section>

        <section class="section-box">
            <h3>Links 🔗</h3>
            <div class="links-container">
                <a href="https://github.com/julixn442" target="_blank" class="link-btn">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="https://youtube.com/@Julian_2044" target="_blank" class="link-btn">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
                <a href="https://twitch.tv/julian442_" target="_blank" class="link-btn">
                    <i class="fab fa-twitch"></i> Twitch
                </a>
                <a href="https://dc.gg/ben" target="_blank" class="link-btn">
                    <i class="fab fa-discord"></i> Discord
                </a>
            </div>
        </section>

        <footer class="footer">
            <p>© 2026 @Julian442 • Powered by SynergyStation</p>
        </footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const profileImg = document.getElementById('profile-img');
            const fallbackIcon = document.getElementById('fallback-icon');

            profileImg.onload = function() {
                profileImg.style.display = 'block';
                fallbackIcon.style.display = 'none';
            };
            profileImg.onerror = function() {
                profileImg.style.display = 'none';
                fallbackIcon.style.display = 'block';
            };
            
            if (profileImg.complete) profileImg.onload();
        });
    </script>
</body>
</html>

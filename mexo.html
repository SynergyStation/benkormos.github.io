<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexo</title>
    
    <link rel="icon" type="image/jpeg" href="pictures/mexo.profilbild.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Modernes & Futuristisches Design */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a162b 0%, #0d0b14 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Haupt-Container auf 800px verbreitert für Nebeneinander-Layout */
        .container {
            width: 100%;
            max-width: 850px;
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Zurück-Link */
        .back-link {
            color: #8b8ea8;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            align-self: flex-start;
        }
        
        .back-link:hover {
            color: #00f2fe;
            transform: translateX(-3px);
        }

        /* Header / Profil */
        .profile {
            text-align: center;
            margin-bottom: 10px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #00f2fe;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover {
            transform: scale(1.08) rotate(5deg);
        }

        h1 {
            font-size: 2.2rem;
            margin: 15px 0 5px 0;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .tagline {
            font-size: 1rem;
            color: #a67cff;
            margin: 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- NEBENIEINANDER GRID --- */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Teilt den Platz in 2 Spalten auf */
            gap: 24px;
            width: 100%;
        }

        /* Boxen / Cards mit Glaseffekt */
        .section-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s ease;
        }

        .section-box:hover {
            border-color: rgba(0, 242, 254, 0.3);
        }

        h3 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            border-bottom: 2px solid rgba(166, 124, 255, 0.2);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #d1d5db;
            margin: 0;
        }

        /* Links Buttons */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-btn i {
            font-size: 1.2rem;
            width: 24px;
            color: #00f2fe;
            transition: color 0.25s;
        }

        .link-btn:hover {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #0d0b14;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.3);
        }

        .link-btn:hover i {
            color: #0d0b14;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
        }

        .footer p {
            font-size: 0.85rem;
            color: #5c5870;
        }

        /* --- RESPONSIVE DESIGN (Für Handys) --- */
        @media (max-width: 700px) {
            .main-content {
                grid-template-columns: 1fr; /* Auf Handys untereinander */
            }
            .container {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Zurück zum Hub
        </a>

        <header class="profile">
            <img src="pictures/mexo.profilbild.png" alt="Profilbild" class="avatar">
            <h1>Mexo</h1>
            <p class="tagline">Developer & Creator</p>
        </header>

        <main class="main-content">
            
            <section class="section-box">
                <h3><i class="fas fa-user"></i> Über mich</h3>
                <p>Ein Sigma Rizzler</p>
            </section>

            <section class="section-box">
                <h3><i class="fas fa-link"></i> Links</h3>
                <div class="links-container">
                    
                    <a href="https://www.twitch.tv/marlow_jeep" target="_blank" class="link-btn">
                        <i class="fab fa-twitch"></i> Twitch
                    </a>
                    <a href="https://dc.gg/ben" target="_blank" class="link-btn">
                        <i class="fab fa-discord"></i> Discord
                    </a>
                    <a href="https://github.com/mexoOG" target="_blank" class="link-btn">
                        <i class="fab fa-github"></i> GitHub
                    </a>
                    <a href="https://www.tiktok.com/@mexoyt2.0" target="_blank" class="link-btn">
                        <i class="fab fa-youtube"></i> YouTube
                    </a>
                    
                </div>
            </section>

        </main>
        <footer class="footer">
            <p>© 2026 @mexo • Powered by SynergyStation</p>
        </footer>
    </div>

</body>
</html>
